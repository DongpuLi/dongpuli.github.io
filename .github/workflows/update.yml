name: Daily Nova Scotia Burn Update

on:
  workflow_dispatch:
  schedule:
    - cron: "51 14 * * *"
    - cron: "56 14 * * *"
    - cron: "1-16/5 15 * * *"
    - cron: "41-56/5 15 * * *"
    - cron: "1-16/5 16 * * *"
    - cron: "1-16/5 17 * * *"

permissions:
  contents: write

concurrency:
  group: daily-nova-scotia-burn-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "utc_time=$(date -u)"
          echo "runner_time=$(date)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run Nova Scotia update
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data docs

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Daily Nova Scotia burn update"
            git push
          fi